<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Megrashy WO — Rencana Keuangan Pernikahan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --violet-700:#6D28D9; --violet-600:#7C3AED; --violet-500:#8B5CF6;
    --violet-400:#A78BFA; --violet-200:#DDD6FE; --violet-100:#EDE9FE; --violet-50:#F5F3FF;
    --gold:#C09438; --rose:#EC6FA6;
    --ink:#241F35; --muted:#8E89A3; --line:#ECE9F4;
    --bg:#F5F3FB; --card:#FFFFFF;
    --green:#15A05A; --green-bg:#E8F7EE; --red:#D6452F; --red-bg:#FBEDE9;
    --amber:#C77A12; --amber-bg:#FDF1DF;
    --shadow:0 18px 40px -22px rgba(76,29,149,.45);
    --shadow-sm:0 8px 22px -16px rgba(76,29,149,.45);
    --serif:'Playfair Display',Georgia,'Times New Roman',serif;
    --sans:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:#E9E5F4;color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  #phone{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.12)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;font-size:15px;color:var(--ink)}
  ::-webkit-scrollbar{width:0;height:0}
  .hidden{display:none!important}

  /* ---------- AUTH ---------- */
  #auth{min-height:100vh;display:flex;flex-direction:column;
    background:radial-gradient(120% 80% at 50% 0%,#8B5CF6 0%,#6D28D9 55%,#4C1D95 100%);
    color:#fff;padding:0 26px;position:relative;overflow:hidden}
  #auth::before{content:"";position:absolute;inset:0;
    background:radial-gradient(40% 30% at 85% 18%,rgba(236,111,166,.35),transparent 70%);}
  .auth-inner{position:relative;z-index:2;display:flex;flex-direction:column;flex:1;padding:64px 0 30px}
  .brand-mark{display:inline-flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.18em;font-size:12px;opacity:.9}
  .brand-mark .ring{width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(255,255,255,.7);display:grid;place-items:center;font-size:13px}
  .auth-hero{margin-top:auto}
  .auth-hero .eyebrow{font-size:12px;letter-spacing:.32em;text-transform:uppercase;opacity:.75;font-weight:600}
  .auth-hero h1{font-family:var(--serif);font-weight:600;font-size:40px;line-height:1.08;margin:14px 0 12px}
  .auth-hero h1 em{font-style:italic;color:#F6D9A8}
  .auth-hero p{opacity:.8;font-size:14px;max-width:320px}
  .auth-card{background:rgba(255,255,255,.97);color:var(--ink);border-radius:26px;padding:24px 22px 26px;margin-top:30px;box-shadow:0 30px 60px -28px rgba(0,0,0,.5)}
  .auth-tabs{display:flex;background:var(--violet-50);border-radius:14px;padding:4px;margin-bottom:18px}
  .auth-tabs button{flex:1;padding:10px;border-radius:11px;font-weight:600;font-size:14px;color:var(--muted);transition:.25s}
  .auth-tabs button.on{background:#fff;color:var(--violet-700);box-shadow:var(--shadow-sm)}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.02em}
  .field input{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:13px;background:#FAF9FE;transition:.2s;outline:none}
  .field input:focus{border-color:var(--violet-400);background:#fff;box-shadow:0 0 0 4px var(--violet-50)}
  .row2{display:flex;gap:10px}.row2>*{flex:1}
  .btn-primary{width:100%;padding:15px;border-radius:14px;background:linear-gradient(135deg,#7C3AED,#6D28D9);color:#fff;font-weight:700;font-size:15px;box-shadow:0 14px 30px -12px rgba(109,40,217,.7);transition:.18s}
  .btn-primary:active{transform:scale(.98)}
  .btn-wa{width:100%;padding:14px;border-radius:14px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 12px 26px -12px rgba(18,140,126,.65);margin-bottom:14px;transition:.18s}
  .btn-wa:active{transform:scale(.98)}
  .btn-wa.line{background:#fff;color:#128C7E;border:1.5px solid #25D366;box-shadow:none}
  .auth-foot{text-align:center;font-size:11px;opacity:.65;margin-top:22px;letter-spacing:.04em}

  /* ---------- APP SHELL ---------- */
  #app{display:none;min-height:100vh;padding-bottom:96px}
  .topbar{background:linear-gradient(150deg,#7C3AED 0%,#6D28D9 70%,#5B21B6 100%);color:#fff;padding:54px 22px 26px;border-radius:0 0 30px 30px;position:relative;overflow:hidden}
  .topbar::after{content:"";position:absolute;right:-40px;top:-30px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(236,111,166,.28),transparent 70%)}
  .tb-row{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2}
  .tb-couple{display:flex;align-items:center;gap:12px}
  .tb-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#F6D9A8,#EC6FA6);display:grid;place-items:center;font-family:var(--serif);font-weight:600;font-size:18px;color:#fff;border:2px solid rgba(255,255,255,.45)}
  .tb-couple .nm{font-family:var(--serif);font-weight:600;font-size:18px;line-height:1.1}
  .tb-couple .sub{font-size:11px;opacity:.8;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
  .ev-pick{display:flex;align-items:center;gap:12px;padding:13px;border-radius:15px;border:1.5px solid var(--line);margin-bottom:10px;cursor:pointer;transition:.15s}
  .ev-pick.on{border-color:var(--violet-500);background:var(--violet-50)}
  .ev-pick:active{transform:scale(.99)}
  .ev-ic{width:46px;height:46px;border-radius:14px;background:var(--violet-50);display:grid;place-items:center;font-size:23px;flex-shrink:0}
  .ev-pick.on .ev-ic{background:#fff}
  .tb-actions{display:flex;gap:8px}
  .icon-btn{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.16);display:grid;place-items:center;font-size:18px;position:relative;backdrop-filter:blur(4px)}
  .badge-dot{position:absolute;top:-2px;right:-2px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:var(--rose);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;border:2px solid #7C3AED}

  .countdown{position:relative;z-index:2;margin-top:22px;display:flex;align-items:flex-end;justify-content:space-between}
  .countdown .big{font-family:var(--serif);font-size:46px;font-weight:600;line-height:1}
  .countdown .big small{font-size:15px;font-weight:500;opacity:.85;margin-left:4px}
  .countdown .meta{text-align:right;font-size:12px;opacity:.85}
  .countdown .meta .d{font-weight:700;font-size:13px}

  .screen{padding:20px 18px 10px;animation:rise .4s ease}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .sec-title{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 14px}
  .sec-title h2{font-family:var(--serif);font-size:22px;font-weight:600}
  .sec-title .mini{font-size:12px;color:var(--violet-600);font-weight:700;letter-spacing:.04em}
  .pill{font-size:10px;font-weight:700;letter-spacing:.08em;padding:4px 9px;border-radius:20px;text-transform:uppercase}

  /* summary cards */
  .summary{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
  .sum-card{background:var(--card);border-radius:20px;padding:16px;box-shadow:var(--shadow-sm)}
  .sum-card .lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
  .sum-card .val{font-size:19px;font-weight:800;margin-top:7px;letter-spacing:-.02em}
  .sum-card.feat{grid-column:1/-1;background:linear-gradient(135deg,#2E1065,#5B21B6);color:#fff}
  .sum-card.feat .lbl{color:rgba(255,255,255,.8)}
  .sum-card.feat .val{font-size:26px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  .progress{height:9px;border-radius:6px;background:var(--violet-100);overflow:hidden;margin-top:12px}
  .progress>span{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,#8B5CF6,#EC6FA6);transition:width .6s}
  .progress-meta{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.85);margin-top:8px;font-weight:600}

  .card{background:var(--card);border-radius:20px;box-shadow:var(--shadow-sm);margin-bottom:13px;overflow:hidden}
  .card-pad{padding:16px}

  /* vendor list */
  .vendor-card{display:flex;flex-direction:column;padding:16px;cursor:pointer;transition:.15s}
  .vendor-card:active{transform:scale(.99)}
  .vc-top{display:flex;align-items:center;gap:13px}
  .vc-ico{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;font-size:23px;flex-shrink:0;background:var(--violet-50)}
  .vc-main{flex:1;min-width:0}
  .vc-main .nm{font-weight:700;font-size:16px;line-height:1.2}
  .vc-main .cat{font-size:12px;color:var(--muted);margin-top:2px}
  .vc-amt{text-align:right;flex-shrink:0}
  .vc-amt .real{font-weight:800;font-size:15px}
  .vc-amt .est{font-size:11px;color:var(--muted);text-decoration:line-through;margin-top:1px}
  .vc-bar{margin-top:13px}
  .vc-bar .track{height:7px;border-radius:5px;background:var(--violet-100);overflow:hidden}
  .vc-bar .track>span{display:block;height:100%;background:linear-gradient(90deg,#8B5CF6,#6D28D9)}
  .vc-bar .lab{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:7px;font-weight:600}
  .status-fix{background:var(--green-bg);color:var(--green)}
  .status-rencana{background:var(--violet-100);color:var(--violet-700)}

  .add-btn{width:100%;padding:15px;border:2px dashed var(--violet-200);border-radius:18px;color:var(--violet-600);font-weight:700;background:var(--violet-50);display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;margin-bottom:14px}
  .add-btn:active{background:var(--violet-100)}

  .empty{text-align:center;padding:40px 24px;color:var(--muted)}
  .empty .ico{font-size:40px;margin-bottom:12px}
  .empty p{font-size:14px}

  /* FAB */
  .fab{position:fixed;bottom:108px;left:50%;transform:translateX(calc(220px - 50%));width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#8B5CF6,#6D28D9);color:#fff;font-size:30px;display:grid;place-items:center;box-shadow:0 16px 30px -10px rgba(109,40,217,.7);z-index:40}
  .fab:active{transform:translateX(calc(220px - 50%)) scale(.93)}
  @media(max-width:480px){.fab{transform:translateX(0);right:22px;left:auto}.fab:active{transform:scale(.93)}}

  /* bottom nav */
  .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;padding:10px 6px 18px;z-index:50}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);font-size:10px;font-weight:600}
  .nav button .ni{font-size:20px;transition:.2s}
  .nav button.on{color:var(--violet-600)}
  .nav button.on .ni{transform:translateY(-2px)}

  /* finance rows */
  .flow-row{display:flex;align-items:center;gap:13px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .flow-row:last-child{border-bottom:none}
  .flow-ico{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;font-size:18px;flex-shrink:0}
  .flow-main{flex:1;min-width:0}
  .flow-main .t{font-weight:700;font-size:14px}
  .flow-main .s{font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .flow-amt{font-weight:800;font-size:15px;text-align:right;flex-shrink:0}
  .amt-in{color:var(--green)} .amt-out{color:var(--red)}
  .tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:.04em}
  .tag.dp{background:var(--violet-100);color:var(--violet-700)}
  .tag.termin{background:var(--amber-bg);color:var(--amber)}
  .tag.pelunasan{background:var(--green-bg);color:var(--green)}
  .tag.lunas{background:var(--green-bg);color:var(--green)}
  .tag.belum{background:var(--red-bg);color:var(--red)}

  .seg{display:flex;background:var(--violet-50);border-radius:13px;padding:4px;margin-bottom:16px}
  .seg button{flex:1;padding:9px;border-radius:10px;font-weight:600;font-size:13px;color:var(--muted)}
  .seg button.on{background:#fff;color:var(--violet-700);box-shadow:var(--shadow-sm)}

  /* documents */
  .doc-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:7px 11px;border-radius:11px;background:var(--violet-50);color:var(--violet-700);margin:0 7px 9px 0}
  .doc-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line)}
  .doc-row:last-child{border-bottom:none}
  .doc-ico{width:40px;height:40px;border-radius:11px;background:var(--violet-50);display:grid;place-items:center;font-size:18px;flex-shrink:0}
  .doc-row .t{font-weight:700;font-size:14px}
  .doc-row .s{font-size:12px;color:var(--muted)}
  .doc-row a{margin-left:auto;color:var(--violet-600);font-weight:700;font-size:12px;text-decoration:none}

  /* ---------- VENDOR DETAIL (fullscreen) ---------- */
  #detail{position:fixed;inset:0;max-width:480px;margin:0 auto;background:var(--bg);z-index:60;overflow-y:auto;display:none;animation:slideup .3s ease}
  @keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
  .d-head{background:linear-gradient(150deg,#7C3AED,#5B21B6);color:#fff;padding:50px 20px 24px;border-radius:0 0 26px 26px;position:relative}
  .d-back{position:absolute;top:48px;left:18px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.18);display:grid;place-items:center;font-size:20px}
  .d-head .cat{font-size:12px;letter-spacing:.1em;text-transform:uppercase;opacity:.8;margin-top:14px}
  .d-head h2{font-family:var(--serif);font-size:27px;font-weight:600;margin-top:4px}
  .d-head .nums{display:flex;gap:22px;margin-top:16px}
  .d-head .nums div .k{font-size:11px;opacity:.8}
  .d-head .nums div .v{font-size:18px;font-weight:800;margin-top:2px}
  .d-body{padding:18px}
  .block{background:#fff;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
  .block h3{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--violet-700);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
  .block h3 .ad{font-size:12px;color:var(--violet-600);background:var(--violet-50);padding:4px 10px;border-radius:9px;letter-spacing:0;text-transform:none}
  .opt-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px dashed var(--line)}
  .opt-row:last-child{border-bottom:none}
  .opt-row .nm{font-weight:600;font-size:14px;flex:1}
  .opt-row .pr{font-weight:700;font-size:14px}
  .opt-row .chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--violet-200);display:grid;place-items:center;font-size:13px;color:#fff;flex-shrink:0}
  .opt-row.sel .chk{background:var(--violet-600);border-color:var(--violet-600)}
  .opt-row.sel .nm{color:var(--violet-700)}
  .fasilitas{font-size:14px;color:#4a4560;white-space:pre-wrap;line-height:1.7}
  .pay-item{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--line)}
  .pay-item:last-child{border-bottom:none}
  .pay-main{flex:1;min-width:0}
  .pay-main .pt{font-weight:700;font-size:14px;display:flex;align-items:center;gap:7px}
  .pay-main .pd{font-size:12px;color:var(--muted);margin-top:3px}
  .pay-amt{font-weight:800;font-size:14px;text-align:right}
  .tiny-btn{font-size:11px;font-weight:700;padding:6px 10px;border-radius:9px;background:var(--violet-50);color:var(--violet-700)}
  .del-x{color:var(--red);font-size:13px;font-weight:700;padding:4px 7px}
  .danger-btn{width:100%;padding:13px;border-radius:13px;background:var(--red-bg);color:var(--red);font-weight:700;font-size:14px;margin-top:4px}

  /* ---------- MODAL ---------- */
  .overlay{position:fixed;inset:0;background:rgba(36,31,53,.55);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-end;justify-content:center}
  .overlay.show{display:flex;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{width:100%;max-width:480px;background:#fff;border-radius:26px 26px 0 0;padding:10px 20px 26px;max-height:92vh;overflow-y:auto;animation:slideup .3s}
  .sheet .grip{width:42px;height:5px;border-radius:3px;background:var(--line);margin:6px auto 16px}
  .sheet h3{font-family:var(--serif);font-size:21px;font-weight:600;margin-bottom:4px}
  .sheet .sub{font-size:13px;color:var(--muted);margin-bottom:18px}
  .ta{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:13px;background:#FAF9FE;outline:none;resize:vertical;min-height:120px;line-height:1.6}
  .ta:focus,.field select:focus{border-color:var(--violet-400);background:#fff}
  .field select{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:13px;background:#FAF9FE;outline:none;appearance:none}
  .help{font-size:11px;color:var(--muted);margin-top:5px}

  /* reminder */
  .rem-item{display:flex;align-items:center;gap:12px;padding:13px;border-radius:14px;background:var(--amber-bg);margin-bottom:10px}
  .rem-item.over{background:var(--red-bg)}
  .rem-item .ri{width:40px;height:40px;border-radius:11px;background:#fff;display:grid;place-items:center;font-size:18px;flex-shrink:0}
  .rem-item .rt{font-weight:700;font-size:14px}
  .rem-item .rs{font-size:12px;color:var(--muted);margin-top:2px}
  .rem-item .ra{margin-left:auto;font-weight:800;font-size:14px;text-align:right}

  /* feedback / satisfaction */
  .stars{display:flex;justify-content:center;gap:10px;margin:16px 0}
  .stars button{font-size:38px;color:var(--line);transition:.15s;line-height:1}
  .stars button.on{color:#F6B93B;transform:scale(1.1)}
  .moods{display:flex;justify-content:space-between;gap:8px;margin:14px 0}
  .mood{flex:1;text-align:center;padding:12px 4px;border-radius:14px;border:1.5px solid var(--line);font-size:11px;font-weight:600;color:var(--muted)}
  .mood .em{font-size:26px;display:block;margin-bottom:5px}
  .mood.on{border-color:var(--violet-500);background:var(--violet-50);color:var(--violet-700)}
  .fb-summary{display:flex;align-items:center;gap:14px;padding:16px;background:linear-gradient(135deg,#FBE9F2,#EDE9FE);border-radius:18px}
  .fb-summary .em{font-size:36px}

  .toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:.3s;box-shadow:0 10px 30px rgba(0,0,0,.3)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
  .profile-card{text-align:center;padding:26px 18px}
  .profile-card .pa{width:80px;height:80px;border-radius:50%;margin:0 auto 14px;background:linear-gradient(135deg,#F6D9A8,#EC6FA6);display:grid;place-items:center;font-family:var(--serif);font-size:30px;color:#fff}
  .profile-card .pn{font-family:var(--serif);font-size:23px;font-weight:600}
  .profile-card .pd{font-size:13px;color:var(--muted);margin-top:4px}
  .info-row{display:flex;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line);font-size:14px}
  .info-row:last-child{border-bottom:none}
  .info-row .k{color:var(--muted)}.info-row .v{font-weight:600}
  .menu-row{display:flex;align-items:center;gap:13px;padding:15px 16px;border-bottom:1px solid var(--line);font-size:14px;font-weight:600}
  .menu-row:last-child{border-bottom:none}

/* =========================================================
   HELPERS
========================================================= */
function rp(n){ n=Math.round(+n||0); return 'Rp '+n.toLocaleString('id-ID'); }
function parseNum(v){ return parseInt((''+v).replace(/[^\d]/g,''))||0; }
function fmtDate(s){ if(!s) return '-'; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }
function fmtDateShort(s){ if(!s) return '-'; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('id-ID',{day:'numeric',month:'short'}); }
function daysUntil(s){ if(!s) return null; const d=new Date(s+'T00:00:00'); const t=new Date(); t.setHours(0,0,0,0); return Math.round((d-t)/86400000); }
function initials(){ const a=(S.auth.p1||'').trim()[0]||'N'; const b=(S.auth.p2||'').trim()[0]||'A'; return (a+'&'+b).toUpperCase(); }

const terbilangSatuan=['','satu','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan','sepuluh','sebelas'];
function terbilang(n){ n=Math.floor(Math.abs(n)); if(n<12) return terbilangSatuan[n];
  if(n<20) return terbilang(n-10)+' belas';
  if(n<100) return terbilang(Math.floor(n/10))+' puluh'+(n%10? ' '+terbilang(n%10):'');
  if(n<200) return 'seratus'+(n%100? ' '+terbilang(n%100):'');
  if(n<1000) return terbilang(Math.floor(n/100))+' ratus'+(n%100? ' '+terbilang(n%100):'');
  if(n<2000) return 'seribu'+(n%1000? ' '+terbilang(n%1000):'');
  if(n<1000000) return terbilang(Math.floor(n/1000))+' ribu'+(n%1000? ' '+terbilang(n%1000):'');
  if(n<1000000000) return terbilang(Math.floor(n/1000000))+' juta'+(n%1000000? ' '+terbilang(n%1000000):'');
  return terbilang(Math.floor(n/1000000000))+' miliar'+(n%1000000000? ' '+terbilang(n%1000000000):'');
}
function terbilangRp(n){ const t=terbilang(n).trim(); return (t? t.charAt(0).toUpperCase()+t.slice(1):'Nol')+' rupiah'; }

/* aggregate calcs */
function totalEstimasi(){ return EV().vendors.reduce((a,v)=>a+(+v.estimasi||0),0); }
function totalRealisasi(){ return EV().vendors.reduce((a,v)=>a+(+v.realisasi||+v.estimasi||0),0); }
function vendorTerbayar(v){ return (v.pembayaran||[]).filter(p=>p.status==='lunas').reduce((a,p)=>a+(+p.jumlah||0),0); }
function vendorTagihan(v){ return (+v.realisasi||+v.estimasi||0); }
function vendorSisa(v){ return Math.max(0, vendorTagihan(v)-vendorTerbayar(v)); }
function totalTerbayar(){ return EV().vendors.reduce((a,v)=>a+vendorTerbayar(v),0); }
function totalSisa(){ return EV().vendors.reduce((a,v)=>a+vendorSisa(v),0); }
function totalPemasukan(){ return EV().pemasukan.reduce((a,p)=>a+(+p.jumlah||0),0); }

/* upcoming/overdue payment list */
function reminderList(){
  const out=[];
  EV().vendors.forEach(v=>(v.pembayaran||[]).forEach(p=>{
    if(p.status==='lunas'||!p.tanggal) return;
    const du=daysUntil(p.tanggal);
    if(du<=14) out.push({vendor:v,pay:p,du});
  }));
  return out.sort((a,b)=>a.du-b.du);
}

function remRow(r){
  const over=r.du<0;
  const lbl=over?`Terlambat ${Math.abs(r.du)} hari`:(r.du===0?'Jatuh tempo hari ini':`${r.du} hari lagi`);
  return `<div class="rem-item ${over?'over':''}" onclick="openVendor('${r.vendor.id}')" style="cursor:pointer;margin-bottom:8px">
    <div class="ri">${r.vendor.icon||'💸'}</div>
    <div><div class="rt">${r.pay.jenis} · ${r.vendor.nama}</div><div class="rs">${fmtDate(r.pay.tanggal)} · ${lbl}</div></div>
    <div class="ra">${rp(r.pay.jumlah)}</div>
  </div>`;
}

  return `<div class="card vendor-card" onclick="openVendor('${v.id}')">

      <div class="vc-amt">

      <div class="track"><span style="width:${pct}%"></span></div>

  </div>

    <div class="block">
      <h3>Opsi Pilihan <button class="ad" onclick="openOpsiForm('${v.id}')">＋ Opsi</button></h3>
      ${(v.opsi&&v.opsi.length)? v.opsi.map((o,i)=>`
        <div class="opt-row ${v.selOpsi===i?'sel':''}" onclick="selectOpsi('${v.id}',${i})">
          <div class="chk">${v.selOpsi===i?'✓':''}</div>
          <div class="nm">${esc(o.nama)}${o.catatan?`<div style="font-size:12px;color:var(--muted);font-weight:400">${esc(o.catatan)}</div>`:''}</div>
          <div class="pr">${rp(o.harga)}</div>
          <div class="del-x" onclick="event.stopPropagation();delOpsi('${v.id}',${i})">✕</div>

        : `<div style="font-size:13px;color:var(--muted)">Belum ada opsi. Tambahkan beberapa pilihan vendor untuk dibandingkan, lalu pilih salah satu.</div>`}
      <div style="font-size:11px;color:var(--muted);margin-top:10px">💡 Ketuk opsi untuk memilih → estimasi & realisasi tersinkron otomatis.</div>
    </div>

    <div class="block">
      <h3>Estimasi & Realisasi <button class="ad" onclick="openNominalForm('${v.id}')">Edit</button></h3>
      <div style="display:flex;gap:16px">
        <div style="flex:1"><div style="font-size:12px;color:var(--muted)">Estimasi Budget</div><div style="font-size:20px;font-weight:800;color:var(--violet-700)">${rp(v.estimasi)}</div></div>
        <div style="flex:1"><div style="font-size:12px;color:var(--muted)">Realisasi (Deal)</div><div style="font-size:20px;font-weight:800">${rp(v.realisasi||0)}</div></div>
      </div>
      ${v.realisasi&&v.estimasi?`<div style="margin-top:10px;font-size:12px;font-weight:600;color:${v.realisasi<=v.estimasi?'var(--green)':'var(--red)'}">

    </div>

      <h3>Jadwal Pembayaran <button class="ad" onclick="openPaymentForm('${v.id}')">＋ Bayar</button></h3>
      ${(v.pembayaran&&v.pembayaran.length)? v.pembayaran.slice().sort((a,b)=>(a.tanggal||'').localeCompare(b.tanggal||'')).map(p=>paymentItem(v,p)).join('')

    <div class="block">
      <h3>Dokumen & Bukti <button class="ad" onclick="openDocForm('${v.id}')">＋ Dokumen</button></h3>

function paymentItem(v,p){
  const tag=p.jenis.toLowerCase().includes('dp')?'dp':(p.jenis.toLowerCase().includes('pelunasan')?'pelunasan':'termin');
  const du=daysUntil(p.tanggal);
  let dueTxt='';
  if(p.status!=='lunas'&&p.tanggal){
    if(du<0) dueTxt=`<span style="color:var(--red);font-weight:700">· Telat ${Math.abs(du)}h</span>`;
    else if(du<=14) dueTxt=`<span style="color:var(--amber);font-weight:700">· ${du===0?'Hari ini':du+'h lagi'}</span>`;
  }
  return `<div class="pay-item">
    <div class="pay-main">
      <div class="pt"><span class="tag ${tag}">${esc(p.jenis)}</span> ${p.metode?'<span style="font-size:12px;color:var(--muted)">via '+esc(p.metode)+'</span>':''}</div>
      <div class="pd">${fmtDate(p.tanggal)} ${dueTxt} ${p.bukti?'· '+esc(p.bukti):''}</div>
    </div>
    <div style="text-align:right">
      <div class="pay-amt">${rp(p.jumlah)}</div>
      <div style="margin-top:5px;display:flex;gap:5px;justify-content:flex-end">
        <button class="tiny-btn ${p.status==='lunas'?'':''}" style="${p.status==='lunas'?'background:var(--green-bg);color:var(--green)':''}" onclick="togglePay('${v.id}','${p.id}')">${p.status==='lunas'?'✓ Lunas':'Tandai Lunas'}</button>
        <button class="tiny-btn" onclick="openKwitansi('${v.id}','${p.id}')">🧾</button>
        <button class="tiny-btn" style="background:var(--red-bg);color:var(--red)" onclick="delPay('${v.id}','${p.id}')">✕</button>
      </div>
    </div>
  </div>`;
}
function docIcon(t){ t=(t||'').toLowerCase();
  if(t.includes('kontrak'))return '📜'; if(t.includes('invoice'))return '🧾';
  if(t.includes('kwitansi'))return '💵'; if(t.includes('transfer'))return '🏦'; return '📎'; }

/* vendor actions */
function selectOpsi(id,i){ const v=EV().vendors.find(x=>x.id===id); v.selOpsi=i;
  v.estimasi=v.opsi[i].harga; if(!v.realisasi||v.status==='rencana') v.realisasi=v.opsi[i].harga;
  save(); renderDetail(); toast('Opsi dipilih'); }
function delOpsi(id,i){ const v=EV().vendors.find(x=>x.id===id); v.opsi.splice(i,1); if(v.selOpsi===i)v.selOpsi=null; save(); renderDetail(); }
function togglePay(id,pid){ const v=EV().vendors.find(x=>x.id===id); const p=v.pembayaran.find(x=>x.id===pid);
  p.status=p.status==='lunas'?'belum':'lunas'; save(); renderDetail(); renderHeader(); toast(p.status==='lunas'?'Pembayaran ditandai lunas ✓':'Dibatalkan'); }
function delPay(id,pid){ const v=EV().vendors.find(x=>x.id===id); v.pembayaran=v.pembayaran.filter(x=>x.id!==pid); save(); renderDetail(); renderHeader(); }
function delDoc(id,did){ const v=EV().vendors.find(x=>x.id===id); v.dokumen=v.dokumen.filter(x=>x.id!==did); save(); renderDetail(); }
function delVendor(id){ confirmSheet('Hapus vendor?','Semua data pembayaran & dokumen vendor ini akan hilang.',()=>{
  EV().vendors=EV().vendors.filter(x=>x.id!==id); save(); closeDetail(); toast('Vendor dihapus'); }); }

   WHATSAPP INTEGRATION (paste-parse + share out)
========================================================= */
function parseAmount(t){
  t=(' '+t.toLowerCase()+' ');
  let m=t.match(/(\d+(?:[.,]\d+)?)\s*(?:jt|juta)/);
  if(m) return Math.round(parseFloat(m[1].replace(',','.'))*1000000);
  m=t.match(/(\d+(?:[.,]\d+)?)\s*(?:rb|ribu|k)\b/);
  if(m) return Math.round(parseFloat(m[1].replace(',','.'))*1000);
  m=t.match(/rp\.?\s*(\d{1,3}(?:[.\s]\d{3})+|\d{4,})/);
  if(m) return parseInt(m[1].replace(/[.\s]/g,''));
  m=t.match(/(\d{1,3}(?:[.\s]\d{3})+)/);
  if(m) return parseInt(m[1].replace(/[.\s]/g,''));
  m=t.match(/\b(\d{4,})\b/);
  if(m) return parseInt(m[1]);
  return 0;
}
function parseWA(text){
  const t=text.toLowerCase();
  const jumlah=parseAmount(t);
  let arah='keluar';
  if(/(masuk|terima|diterima|nerima|dapat|pemasukan|setor|tabung)/.test(t) && !/(bayar|transfer ke|keluar|beli)/.test(t)) arah='masuk';
  if(/(bayar|byr|transfer ke|tf ke|dp|termin|pelunasan|keluar|beli|sewa)/.test(t)) arah='keluar';
  let jenis='Termin 1';
  if(/\bdp\b|down ?payment|uang muka|tanda jadi|booking fee/.test(t)) jenis='DP';
  else if(/pelunasan|lunasi|melunasi|sisa pembayaran|final/.test(t)) jenis='Pelunasan';
  else if(/termin 2|termin ke ?2|termin kedua/.test(t)) jenis='Termin 2';
  else if(/termin/.test(t)) jenis='Termin 1';
  let vendorId=null;
  EV().vendors.forEach(v=>{
    const words=(v.nama.toLowerCase()+' '+(v.kategori||'').toLowerCase()).split(/\s+/).filter(w=>w.length>=3);
    if(words.some(w=>t.includes(w))) vendorId=v.id;
  });
  let metode='';
  const mm=t.match(/bca|mandiri|bni|bri|cash|tunai|gopay|ovo|qris|seabank/);
  if(mm) metode=mm[0].toUpperCase();
  let tanggal=addDays(0);
  if(/kemarin/.test(t)) tanggal=addDays(-1);
  else if(/lusa/.test(t)) tanggal=addDays(2);
  else if(/besok/.test(t)) tanggal=addDays(1);
  const dm=t.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/);
  if(dm){ let y=dm[3]?(dm[3].length===2?'20'+dm[3]:dm[3]):(''+new Date().getFullYear());
    tanggal=`${y}-${String(dm[2]).padStart(2,'0')}-${String(dm[1]).padStart(2,'0')}`; }
  return {arah,jumlah,jenis,vendorId,metode,tanggal};
}

      <div class="field"><label>Vendor</label><select id="wa-vendor" onchange="waToggleVendor()">${vendorOpts}<option value="__new__">➕ Vendor baru…</option></select></div>
      <div class="field hidden" id="wa-newvwrap"><label>Nama Vendor Baru</label><input id="wa-newv" placeholder="Nama vendor"></div>
      <div class="row2"><div class="field"><label>Jenis</label><select id="wa-jenis"><option>DP</option><option>Termin 1</option><option>Termin 2</option><option>Termin 3</option><option>Pelunasan</option></select></div>
        <div class="field"><label>Status</label><select id="wa-status"><option value="lunas">Sudah dibayar</option><option value="belum">Belum (jadwal)</option></select></div></div>
    </div>
    <div id="wa-masuk" class="hidden"><div class="field"><label>Sumber Dana</label><input id="wa-sumber" placeholder="cth: Orang tua / Tabungan"></div></div>
    <div class="row2"><div class="field"><label>Jumlah</label><input id="wa-jumlah" inputmode="numeric" placeholder="0"></div>
      <div class="field"><label>Tanggal</label><input id="wa-tgl" type="date" value="${addDays(0)}"></div></div>
    <div class="field"><label>Metode / Catatan</label><input id="wa-metode" placeholder="BCA / Mandiri / Cash"></div>
    <button class="btn-primary" id="wa-save" style="margin-top:6px">Simpan Transaksi</button>
    <div style="background:var(--violet-50);border-radius:12px;padding:12px;margin-top:14px;font-size:11px;color:#6b6685;line-height:1.6">
      ℹ️ <b>Tentang integrasi WhatsApp:</b> mode ini mengubah chat jadi data dengan sekali tempel. Untuk <b>otomatis penuh</b> (transaksi masuk sendiri tiap ada chat, seperti MoneyKita) dibutuhkan server + WhatsApp Business API — bisa dibangun sebagai tahap lanjutan.</div>`);
  if(!EV().vendors.length){ const sel=document.getElementById('wa-vendor'); sel.value='__new__'; waToggleVendor(); }
  rupiahInput('wa-jumlah');
  document.getElementById('wa-parse').onclick=waParse;
  document.getElementById('wa-save').onclick=waSave;
  waToggleArah();
}
function waToggleArah(){ const a=document.getElementById('wa-arah').value;
  document.getElementById('wa-keluar').classList.toggle('hidden',a!=='keluar');
  document.getElementById('wa-masuk').classList.toggle('hidden',a!=='masuk'); }
function waToggleVendor(){ const nw=document.getElementById('wa-vendor').value==='__new__';
  document.getElementById('wa-newvwrap').classList.toggle('hidden',!nw); }
function waParse(){
  const txt=document.getElementById('wa-text').value; if(!txt.trim()){toast('Tempel pesannya dulu ya');return;}
  const r=parseWA(txt);
  document.getElementById('wa-arah').value=r.arah; waToggleArah();
  document.getElementById('wa-jumlah').value=r.jumlah?r.jumlah.toLocaleString('id-ID'):'';
  document.getElementById('wa-tgl').value=r.tanggal;
  document.getElementById('wa-metode').value=r.metode||'';
  if(r.arah==='keluar'){
    document.getElementById('wa-jenis').value=r.jenis;
    const sel=document.getElementById('wa-vendor');
    if(r.vendorId){ sel.value=r.vendorId; } else { sel.value='__new__'; }
    waToggleVendor();
  } else {
    document.getElementById('wa-sumber').value=(txt.split(/dari\s+/i)[1]||'WhatsApp').split(/\s/).slice(0,3).join(' ');
  }
  toast(r.jumlah?('Terbaca '+rp(r.jumlah)+' — periksa lalu simpan'):'Nominal tak terbaca, isi manual ya');
}
function waSave(){
  const arah=document.getElementById('wa-arah').value;
  const jumlah=parseNum(document.getElementById('wa-jumlah').value);
  const tanggal=document.getElementById('wa-tgl').value;
  const metode=document.getElementById('wa-metode').value.trim();
  if(!jumlah){ toast('Isi jumlahnya'); return; }
  if(arah==='masuk'){
    EV().pemasukan.push({id:uid(),sumber:document.getElementById('wa-sumber').value.trim()||'WhatsApp',jumlah,tanggal,catatan:metode||'via WhatsApp'});
    save(); closeSheet(); keuTab='masuk'; go('keuangan'); toast('Dana masuk dicatat 💰'); return;
  }
  let vid=document.getElementById('wa-vendor').value;
  if(vid==='__new__'){
    const nm=document.getElementById('wa-newv').value.trim();
    if(!nm){ toast('Isi nama vendor baru'); return; }
    const nv={id:uid(),kategori:'Lainnya',nama:nm,status:'fix',icon:'💸',opsi:[],selOpsi:null,estimasi:0,realisasi:0,fasilitas:'',pembayaran:[],dokumen:[]};
    EV().vendors.push(nv); vid=nv.id;
  }
  const v=EV().vendors.find(x=>x.id===vid);
  if(!v.pembayaran) v.pembayaran=[];
  v.pembayaran.push({id:uid(),jenis:document.getElementById('wa-jenis').value,jumlah,tanggal,metode,status:document.getElementById('wa-status').value,bukti:'via WhatsApp'});
  if(!v.realisasi) v.realisasi=v.estimasi||vendorTerbayar(v);
  save(); closeSheet(); keuTab='keluar'; go('keuangan'); toast('Transaksi tersimpan ✓');
}
function waSend(text){ try{ window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank'); }catch(e){ toast('Tidak bisa membuka WhatsApp'); } }
function waSendReminders(){
  const rl=reminderList(); if(!rl.length){ toast('Tidak ada tagihan terdekat'); return; }
  let t=`*Pengingat Pembayaran Pernikahan*\n${S.auth.p1} & ${S.auth.p2}\n\n`;
  rl.forEach(r=>{ const du=r.du<0?`telat ${Math.abs(r.du)} hari`:(r.du===0?'hari ini':`${r.du} hari lagi`);
    t+=`• ${r.pay.jenis} — ${r.vendor.nama}\n  ${rp(r.pay.jumlah)} · jatuh tempo ${fmtDate(r.pay.tanggal)} (${du})\n`; });
  t+=`\n*Total: ${rp(rl.reduce((a,r)=>a+(+r.pay.jumlah||0),0))}*\n\n_Dikirim via Megrashy WO_`;
  waSend(t);
}
function waSendKwitansi(vid,pid){
  const v=EV().vendors.find(x=>x.id===vid); const p=v.pembayaran.find(x=>x.id===pid);
  const t=`*KWITANSI — Megrashy WO*\n\nTelah diterima dari: ${S.auth.p1} & ${S.auth.p2}\nUntuk: ${p.jenis} — ${v.nama}\n\n*${rp(p.jumlah)}*\nTerbilang: ${terbilangRp(p.jumlah)}\n\nTanggal: ${fmtDate(p.tanggal)}\nStatus: ${p.status==='lunas'?'LUNAS ✅':'BELUM LUNAS'}\n\n_Terima kasih 💜_`;
  waSend(t);
}

/* =========================================================
   BOOT
========================================================= */
switchAuth('login');
if(S.auth&&S.auth.loggedIn){ migrateState(); enterApp(); }
</script>
</body>
</html>
